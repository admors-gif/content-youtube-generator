name: Debug — capturar logs y estado del VPS

# Solo manual: no se dispara en push.
# Recoge logs del API + workers + dmesg + memoria, y los sube como artifact
# para diagnóstico sin necesidad de SSH.
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'project_id a buscar en logs (opcional, deja vacío para volcar todo)'
        required: false
        default: ''
      log_lines:
        description: 'líneas de logs a capturar por container'
        required: false
        default: '2000'
      project_safetitle:
        description: 'safe_title del proyecto para listar archivos en disco (opcional)'
        required: false
        default: ''

concurrency:
  group: debug-worker
  cancel-in-progress: false

jobs:
  collect:
    name: Collect logs and system state
    runs-on: [self-hosted, linux, vps, docker]
    timeout-minutes: 5

    steps:
      - name: Prepare output directory
        run: |
          rm -rf debug_output
          mkdir -p debug_output

      - name: Container list
        run: |
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.RunningFor}}' \
            > debug_output/00_containers.txt 2>&1 || true
          docker stats --no-stream --format 'table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}' \
            >> debug_output/00_containers.txt 2>&1 || true

      - name: API container logs
        run: |
          docker logs content-factory --tail ${{ github.event.inputs.log_lines }} \
            > debug_output/01_api_logs.txt 2>&1 || echo "no content-factory container" > debug_output/01_api_logs.txt

      - name: Worker container logs (all replicas)
        run: |
          for c in $(docker ps -a --format '{{.Names}}' | grep -E 'content-worker|content_worker' || true); do
            echo "==== $c ====" >> debug_output/02_worker_logs.txt
            docker logs "$c" --tail ${{ github.event.inputs.log_lines }} >> debug_output/02_worker_logs.txt 2>&1 || true
            echo "" >> debug_output/02_worker_logs.txt
          done
          [ -s debug_output/02_worker_logs.txt ] || echo "no worker containers found" > debug_output/02_worker_logs.txt

      - name: Redis container logs (Celery broker)
        run: |
          for c in $(docker ps -a --format '{{.Names}}' | grep -E 'content-redis|redis' | head -3 || true); do
            echo "==== $c ====" >> debug_output/03_redis_logs.txt
            docker logs "$c" --tail 500 >> debug_output/03_redis_logs.txt 2>&1 || true
            echo "" >> debug_output/03_redis_logs.txt
          done
          [ -s debug_output/03_redis_logs.txt ] || echo "no redis containers found" > debug_output/03_redis_logs.txt

      - name: Filter logs for project_id (if provided)
        if: ${{ github.event.inputs.project_id != '' }}
        run: |
          PID="${{ github.event.inputs.project_id }}"
          echo "=== Lines mentioning project_id=$PID ===" > debug_output/04_project_filtered.txt
          grep -F "$PID" debug_output/01_api_logs.txt debug_output/02_worker_logs.txt \
            >> debug_output/04_project_filtered.txt 2>/dev/null || echo "no matches" >> debug_output/04_project_filtered.txt

      - name: Kernel ring buffer (OOM, restarts)
        run: |
          dmesg --time-format iso 2>/dev/null | tail -300 \
            > debug_output/05_dmesg.txt 2>&1 || echo "dmesg unavailable (need root?)" > debug_output/05_dmesg.txt
          # OOM kills específicos
          dmesg 2>/dev/null | grep -iE 'killed process|out of memory|oom' | tail -50 \
            > debug_output/05_dmesg_oom.txt 2>&1 || true

      - name: Docker events últimos 30 min
        run: |
          docker events --since 30m --until 0s --format '{{.Time}} {{.Action}} {{.Type}} {{.Actor.Attributes.name}}' \
            > debug_output/06_docker_events.txt 2>&1 &
          EV_PID=$!
          sleep 3
          kill $EV_PID 2>/dev/null || true
          wait $EV_PID 2>/dev/null || true

      - name: Memory and disk
        run: |
          free -h > debug_output/07_memory.txt 2>&1 || true
          df -h /docker /var/lib/docker 2>&1 >> debug_output/07_memory.txt || true

      - name: Project filesystem inventory (if safe_title provided)
        if: ${{ github.event.inputs.project_safetitle != '' }}
        continue-on-error: true
        run: |
          set +e  # No fallar si algún ls devuelve no-existe
          ST="${{ github.event.inputs.project_safetitle }}"
          {
            echo "=== Listado de TODAS las carpetas de proyecto ==="
            docker exec content-factory ls -la /app/output/videos/ 2>&1 | head -50
            echo ""
            echo "=== /app/output/videos/$ST/ (top) ==="
            docker exec content-factory ls -la "/app/output/videos/$ST/" 2>&1
            echo ""
            for sub in images audio kenburns luma_clips composites; do
              echo "=== $sub ==="
              docker exec content-factory bash -lc "test -d /app/output/videos/$ST/$sub && (ls /app/output/videos/$ST/$sub/ 2>/dev/null | wc -l | xargs echo total_files= ; du -sh /app/output/videos/$ST/$sub/ 2>/dev/null) || echo 'no existe'"
              echo ""
            done
            echo "=== Final MP4s ==="
            docker exec content-factory bash -lc "ls -la /app/output/videos/$ST/FINAL_*.mp4 2>/dev/null || echo no FINAL"
            echo ""
            echo "=== Media durations (ffprobe) ==="
            docker exec content-factory bash -lc '
              shopt -s nullglob
              files=(/app/output/videos/'"$ST"'/FINAL_*.mp4 /app/output/videos/'"$ST"'/master_visual.mp4 /app/output/videos/'"$ST"'/master_audio.mp3)
              if [ ${#files[@]} -eq 0 ]; then
                echo "no media files"
              fi
              for f in "${files[@]}"; do
                echo "--- $(basename "$f")"
                ls -lh "$f" 2>/dev/null
                ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$f" 2>&1 || true
              done
            '
          } > debug_output/09_project_files.txt 2>&1
          set -e

      - name: Worker process tree (busca ffmpeg/python activos)
        continue-on-error: true
        run: |
          set +e
          {
            for c in $(docker ps --format '{{.Names}}' | grep -E 'content-worker' || true); do
              echo "=== $c — procesos ==="
              docker exec "$c" ps -ef --sort=-pcpu 2>/dev/null | head -15
              echo ""
            done
          } > debug_output/10_worker_processes.txt 2>&1
          set -e

      - name: Container restart counts
        run: |
          for c in $(docker ps -a --format '{{.Names}}' | grep -E 'content-' || true); do
            COUNT=$(docker inspect --format '{{.RestartCount}}' "$c" 2>/dev/null || echo "?")
            STATE=$(docker inspect --format '{{.State.Status}}' "$c" 2>/dev/null || echo "?")
            EXIT=$(docker inspect --format '{{.State.ExitCode}}' "$c" 2>/dev/null || echo "?")
            FINISHED=$(docker inspect --format '{{.State.FinishedAt}}' "$c" 2>/dev/null || echo "?")
            echo "$c | restarts=$COUNT | state=$STATE | exit=$EXIT | finishedAt=$FINISHED" >> debug_output/08_restarts.txt
          done

      - name: Qdrant read-only inventory
        continue-on-error: true
        run: |
          set +e
          {
            echo "=== qdrant container ==="
            docker ps -a --filter name=qdrant --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'
            echo ""
            echo "=== qdrant inspect summary ==="
            docker inspect qdrant --format 'image={{.Config.Image}}' 2>&1
            docker inspect qdrant --format 'restartPolicy={{.HostConfig.RestartPolicy.Name}}' 2>&1
            docker inspect qdrant --format 'ports={{json .NetworkSettings.Ports}}' 2>&1
            docker inspect qdrant --format 'mounts={{json .Mounts}}' 2>&1
            docker inspect qdrant --format 'networks={{range $name, $net := .NetworkSettings.Networks}}{{$name}} {{$net.IPAddress}} {{end}}' 2>&1
          } > debug_output/11_qdrant_container.txt 2>&1

          python3 - <<'PY' > debug_output/12_qdrant_inventory.json 2>&1
          import json
          import subprocess
          import urllib.error
          import urllib.parse
          import urllib.request

          def emit(obj):
              print(json.dumps(obj, ensure_ascii=False, indent=2, sort_keys=True))

          def qdrant_request(base, method, path, body=None, api_key=None, timeout=5):
              data = None
              headers = {}
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  headers["content-type"] = "application/json"
              if api_key:
                  headers["api-key"] = api_key
              req = urllib.request.Request(base.rstrip("/") + path, data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  raw = resp.read().decode("utf-8", errors="replace")
                  return json.loads(raw) if raw else {}

          def truncate_value(value, limit=220):
              if isinstance(value, str):
                  clean = " ".join(value.split())
                  return clean[:limit] + ("..." if len(clean) > limit else "")
              if isinstance(value, (int, float, bool)) or value is None:
                  return value
              if isinstance(value, list):
                  return [truncate_value(item, limit=120) for item in value[:5]]
              if isinstance(value, dict):
                  return {str(k): truncate_value(v, limit=120) for k, v in list(value.items())[:12]}
              return str(value)[:limit]

          def sanitize_points(points):
              out = []
              for point in points[:3]:
                  payload = point.get("payload") or {}
                  out.append({
                      "id": str(point.get("id")),
                      "payloadKeys": sorted(str(k) for k in payload.keys()),
                      "payloadPreview": {str(k): truncate_value(v) for k, v in list(payload.items())[:12]},
                  })
              return out

          try:
              raw = subprocess.check_output(["docker", "inspect", "qdrant"], text=True)
              inspect = json.loads(raw)[0]
          except Exception as exc:
              emit({"ok": False, "error": f"docker inspect qdrant failed: {exc}"})
              raise SystemExit(0)

          ips = []
          for network in (inspect.get("NetworkSettings", {}).get("Networks") or {}).values():
              ip = network.get("IPAddress")
              if ip:
                  ips.append(ip)

          env_map = {}
          for item in inspect.get("Config", {}).get("Env") or []:
              if "=" in item:
                  key, value = item.split("=", 1)
                  env_map[key] = value
          api_key_name = None
          api_key = None
          for candidate in (
              "QDRANT__SERVICE__READ_ONLY_API_KEY",
              "QDRANT__SERVICE__API_KEY",
              "QDRANT_API_KEY",
          ):
              value = env_map.get(candidate)
              if value:
                  api_key_name = candidate
                  api_key = value
                  break

          bases = ["http://127.0.0.1:6333", "http://localhost:6333"]
          bases += [f"http://{ip}:6333" for ip in ips]
          bases.append("http://qdrant:6333")

          tried = []
          selected = None
          collections_response = None
          for base in bases:
              try:
                  collections_response = qdrant_request(base, "GET", "/collections", api_key=api_key)
                  selected = base
                  break
              except Exception as exc:
                  tried.append({"base": base, "error": str(exc)[:240]})

          if not selected:
              emit({"ok": False, "tried": tried})
              raise SystemExit(0)

          collection_names = [
              item.get("name")
              for item in (collections_response.get("result", {}) or {}).get("collections", [])
              if item.get("name")
          ]
          result = {
              "ok": True,
              "endpoint": selected,
              "authSource": api_key_name,
              "collectionCount": len(collection_names),
              "collections": [],
              "triedBeforeSuccess": tried,
          }

          for name in collection_names:
              quoted = urllib.parse.quote(name, safe="")
              entry = {"name": name}
              try:
                  detail = qdrant_request(selected, "GET", f"/collections/{quoted}", api_key=api_key)
                  info = detail.get("result", {}) or {}
                  entry["status"] = info.get("status")
                  entry["pointsCount"] = info.get("points_count")
                  entry["vectorsCount"] = info.get("vectors_count")
                  entry["indexedVectorsCount"] = info.get("indexed_vectors_count")
                  entry["segmentsCount"] = info.get("segments_count")
                  entry["config"] = truncate_value(info.get("config") or {}, limit=160)
                  entry["payloadSchema"] = truncate_value(info.get("payload_schema") or {}, limit=160)
              except Exception as exc:
                  entry["detailError"] = str(exc)[:240]

              try:
                  sample = qdrant_request(
                      selected,
                      "POST",
                      f"/collections/{quoted}/points/scroll",
                      {"limit": 3, "with_payload": True, "with_vector": False},
                      api_key=api_key,
                  )
                  points = (sample.get("result", {}) or {}).get("points", [])
                  entry["samplePoints"] = sanitize_points(points)
              except Exception as exc:
                  entry["sampleError"] = str(exc)[:240]

              result["collections"].append(entry)

          emit(result)
          PY
          set -e

      - name: n8n Qdrant workflow shape
        continue-on-error: true
        run: |
          set +e
          python3 - <<'PY' > debug_output/13_n8n_qdrant_workflows.json 2>&1
          import json
          import re
          import subprocess

          WORKFLOWS = {
              "1O0K76DbveSwtaPG": "RAG Ingestion — Valtyk Knowledge Base",
              "GArjMF6BN5GT7NfV": "Qdrant Stats API",
              "jWeH5AUjtox29Fch": "Qdrant Admin API",
              "NR8t6QPq7zweoGYY": "KB Corrections — Upsert to Qdrant",
          }

          SECRET_KEY = re.compile(
              r"(secret|token|password|passwd|api[_ -]?key|authorization|credential|client[_ -]?secret|private[_ -]?key)",
              re.I,
          )
          SECRET_VALUE = re.compile(
              r"(bearer\s+[a-z0-9._-]+|sk-[a-z0-9_-]+|gh[pousr]_[a-z0-9_]+)",
              re.I,
          )

          def redact(value, key=""):
              if SECRET_KEY.search(str(key)):
                  return "[REDACTED]"
              if isinstance(value, dict):
                  secret_named_value = SECRET_KEY.search(str(value.get("name", ""))) or SECRET_KEY.search(str(value.get("header", "")))
                  redacted = {}
                  for k, v in value.items():
                      if secret_named_value and str(k).lower() in {"value", "default", "expression"}:
                          redacted[str(k)] = "[REDACTED]"
                      else:
                          redacted[str(k)] = redact(v, k)
                  return redacted
              if isinstance(value, list):
                  return [redact(item, key) for item in value[:30]]
              if isinstance(value, str):
                  if SECRET_VALUE.search(value):
                      return "[REDACTED_STRING]"
                  if re.search(r"(apiKey|api-key|api_key|authorization|bearer|token|secret|password)", value, re.I):
                      return "[REDACTED_STRING_WITH_SECRET_REFERENCE]"
                  clean = value.replace("\r", "\\r")
                  return clean[:900] + ("...[TRUNCATED]" if len(clean) > 900 else "")
              return value

          def run(cmd, timeout=90):
              return subprocess.run(cmd, capture_output=True, text=True, timeout=timeout)

          def export_workflow(workflow_id):
              container_path = f"/tmp/n8n_export_{workflow_id}.json"
              export_cmd = [
                  "docker",
                  "exec",
                  "n8n-n8n-1",
                  "n8n",
                  "export:workflow",
                  f"--id={workflow_id}",
                  f"--output={container_path}",
              ]
              exported = run(export_cmd)
              if exported.returncode != 0:
                  return {
                      "id": workflow_id,
                      "expectedName": WORKFLOWS[workflow_id],
                      "ok": False,
                      "exportError": (exported.stderr or exported.stdout)[:800],
                  }

              cat = run(["docker", "exec", "n8n-n8n-1", "cat", container_path], timeout=30)
              run(["docker", "exec", "n8n-n8n-1", "rm", "-f", container_path], timeout=20)
              if cat.returncode != 0:
                  return {
                      "id": workflow_id,
                      "expectedName": WORKFLOWS[workflow_id],
                      "ok": False,
                      "readError": (cat.stderr or cat.stdout)[:800],
                  }

              try:
                  raw = json.loads(cat.stdout)
              except Exception as exc:
                  return {
                      "id": workflow_id,
                      "expectedName": WORKFLOWS[workflow_id],
                      "ok": False,
                      "parseError": str(exc),
                      "rawPreview": cat.stdout[:800],
                  }

              workflow = raw[0] if isinstance(raw, list) and raw else raw
              nodes = []
              for node in workflow.get("nodes", []):
                  nodes.append({
                      "name": node.get("name"),
                      "type": node.get("type"),
                      "typeVersion": node.get("typeVersion"),
                      "disabled": bool(node.get("disabled")),
                      "parameters": redact(node.get("parameters") or {}),
                      "hasCredentials": bool(node.get("credentials")),
                  })

              return {
                  "id": workflow_id,
                  "expectedName": WORKFLOWS[workflow_id],
                  "ok": True,
                  "name": workflow.get("name"),
                  "active": workflow.get("active"),
                  "nodeCount": len(nodes),
                  "nodes": nodes,
                  "connections": redact(workflow.get("connections") or {}),
              }

          result = {workflow_id: export_workflow(workflow_id) for workflow_id in WORKFLOWS}
          print(json.dumps(result, ensure_ascii=False, indent=2, sort_keys=True))
          PY
          set -e

      - name: Upload debug bundle
        uses: actions/upload-artifact@v4
        with:
          name: vps-debug-${{ github.run_id }}
          path: debug_output/
          retention-days: 7

name: Deploy backend to VPS

on:
  push:
    branches:
      - master
    paths:
      - 'api.py'
      - 'scripts/**'
      - 'prompts/**'
      - 'Dockerfile'
      - 'docker-compose.yaml'
      - 'requirements.txt'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy on srv1375702
    runs-on: [self-hosted, linux, vps, docker]
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync source to /docker/content-factory
        run: |
          set -euo pipefail
          rsync -av --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='output/' \
            --exclude='web/' \
            --exclude='Backups/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='*-key.json' \
            --exclude='*-key*.json' \
            --exclude='firebase-admin*.json' \
            --exclude='content-factory-tts-*.json' \
            --exclude='hostinger_env.txt' \
            --exclude='CONTEXT_COMPLETO.md' \
            --exclude='MANUAL.md' \
            --exclude='README.md' \
            ./ /docker/content-factory/
          ls -la /docker/content-factory/

      - name: Merge runtime secrets into VPS env
        env:
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REDIRECT_URI: ${{ secrets.YOUTUBE_OAUTH_REDIRECT_URI }}
          CONTENT_FACTORY_WEB_URL: ${{ secrets.CONTENT_FACTORY_WEB_URL }}
          CONTENT_FACTORY_YOUTUBE_STATE_SECRET: ${{ secrets.CONTENT_FACTORY_YOUTUBE_STATE_SECRET }}
          CONTENT_FACTORY_YOUTUBE_TOKEN_SECRET: ${{ secrets.CONTENT_FACTORY_YOUTUBE_TOKEN_SECRET }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_OAUTH_REDIRECT_URI: ${{ secrets.TIKTOK_OAUTH_REDIRECT_URI }}
          CONTENT_FACTORY_TIKTOK_STATE_SECRET: ${{ secrets.CONTENT_FACTORY_TIKTOK_STATE_SECRET }}
          CONTENT_FACTORY_TIKTOK_TOKEN_SECRET: ${{ secrets.CONTENT_FACTORY_TIKTOK_TOKEN_SECRET }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_KNOWLEDGE_COLLECTION: ${{ secrets.QDRANT_KNOWLEDGE_COLLECTION }}
        run: |
          set -euo pipefail
          cd /docker/content-factory
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          path = Path(".env")
          names = [
              "YOUTUBE_OAUTH_CLIENT_ID",
              "YOUTUBE_OAUTH_CLIENT_SECRET",
              "YOUTUBE_OAUTH_REDIRECT_URI",
              "CONTENT_FACTORY_WEB_URL",
              "CONTENT_FACTORY_YOUTUBE_STATE_SECRET",
              "CONTENT_FACTORY_YOUTUBE_TOKEN_SECRET",
              "TIKTOK_CLIENT_KEY",
              "TIKTOK_CLIENT_SECRET",
              "TIKTOK_OAUTH_REDIRECT_URI",
              "CONTENT_FACTORY_TIKTOK_STATE_SECRET",
              "CONTENT_FACTORY_TIKTOK_TOKEN_SECRET",
              "QDRANT_URL",
              "QDRANT_API_KEY",
              "QDRANT_KNOWLEDGE_COLLECTION",
          ]
          updates = {name: os.environ.get(name, "").strip() for name in names}
          updates = {name: value for name, value in updates.items() if value}

          # If the repo secret has not been added yet, reuse the API key from the
          # existing Qdrant container on the VPS. Do not print the value.
          if not updates.get("QDRANT_API_KEY"):
              try:
                  raw = subprocess.check_output(
                      ["docker", "inspect", "qdrant", "--format", "{{range .Config.Env}}{{println .}}{{end}}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
                  env_map = {}
                  for item in raw.splitlines():
                      if "=" in item:
                          key, value = item.split("=", 1)
                          env_map[key] = value
                  for candidate in (
                      "QDRANT__SERVICE__API_KEY",
                      "QDRANT__SERVICE__READ_ONLY_API_KEY",
                      "QDRANT_API_KEY",
                  ):
                      value = env_map.get(candidate, "").strip()
                      if value:
                          updates["QDRANT_API_KEY"] = value
                          break
              except Exception:
                  pass

          updates.setdefault("QDRANT_URL", "http://qdrant:6333")
          updates.setdefault("QDRANT_KNOWLEDGE_COLLECTION", "valtyk_knowledge")

          if not updates:
              print("No runtime secrets configured; leaving .env unchanged")
              raise SystemExit(0)

          existing = path.read_text(encoding="utf-8").splitlines() if path.exists() else []
          out = []
          seen = set()
          for line in existing:
              key = None
              if "=" in line and not line.lstrip().startswith("#"):
                  key = line.split("=", 1)[0].strip()
              if key in updates:
                  if key not in seen:
                      out.append(f"{key}={updates[key]}")
                      seen.add(key)
                  continue
              out.append(line)

          for key, value in updates.items():
              if key not in seen:
                  out.append(f"{key}={value}")

          path.write_text("\n".join(out).rstrip() + "\n", encoding="utf-8")
          print(f"Updated {len(updates)} runtime env vars in /docker/content-factory/.env")
          PY
          chmod 600 .env || true

      - name: Build and start container
        run: |
          set -euo pipefail
          cd /docker/content-factory
          # --scale content-worker=3: mantiene 3 workers paralelos en cada deploy
          # Sin esto, docker compose up resetearía a 1 réplica por defecto.
          docker compose up -d --build --remove-orphans --scale content-worker=3

      - name: Wait for healthcheck
        run: |
          set -euo pipefail
          echo "Esperando hasta 90s a que el container reporte healthy..."
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format '{{.State.Health.Status}}' content-factory 2>/dev/null || echo "missing")
            echo "  intento $i/18: status=$STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container healthy"
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "Container reporta UNHEALTHY"
              docker logs content-factory --tail 40
              exit 1
            fi
            sleep 5
          done
          echo "Timeout esperando healthcheck"
          docker logs content-factory --tail 40
          exit 1

      - name: Smoke test public HTTPS endpoint
        run: |
          set -euo pipefail
          RESP=$(curl -sf https://api.valtyk.com/)
          echo "Response: $RESP"
          echo "$RESP" | grep -q '"status":"online"' || (echo "Respuesta no esperada" && exit 1)

      - name: Show recent container logs
        if: always()
        run: |
          docker logs content-factory --tail 20 2>&1 || true
